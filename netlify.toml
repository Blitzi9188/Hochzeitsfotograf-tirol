[build]
publish = "."
functions = "netlify/functions"

[[redirects]]
from = "/api/stripe/create-checkout-session"
to = "/.netlify/functions/stripe-create-checkout-session"
status = 200
force = true

[[redirects]]
from = "/api/stripe/session-summary"
to = "/.netlify/functions/stripe-session-summary"
status = 200
force = true

[[redirects]]
from = "/api/academy/session-download-link"
to = "/.netlify/functions/academy-session-download-link"
status = 200
force = true

[[redirects]]
from = "/api/academy/download"
to = "/.netlify/functions/academy-download"
status = 200
force = true

[[redirects]]
from = "/api/stripe/webhook"
to = "/.netlify/functions/stripe-webhook"
status = 200
force = true
