<!DOCTYPE html>
<html lang="de" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impressum | Blitzkneisser Photography</title>
  <meta name="description" content="Impressum von Blitzkneisser Photography.">
  <link rel="icon" type="image/png" href="/Logo-Blitzkneisser-BERG.png">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "sans-serif"] },
          colors: {
            brand: {
              bg: "#FFFFFF",
              text: "#1B1A18",
              muted: "#8A837A",
              border: "#E6DED4"
            }
          }
        }
      }
    };
  </script>
  <style>
    body {
      background: #FFFFFF;
      color: #1B1A18;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .headline {
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 0.92;
      text-transform: uppercase;
    }
    .legal-copy p + p {
      margin-top: 1.15rem;
    }
    .mobile-menu-toggle {
      display: none;
    }
    .floating-lang-toggle {
      display: none;
    }
    @media (max-width: 767px) {
      .mobile-menu-toggle {
        display: inline-flex;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
        width: 44px;
        height: 44px;
        margin-left: auto;
      }
      .mobile-menu-toggle span {
        width: 24px;
        height: 2px;
        margin-left: auto;
        background: #1B1A18;
        transition: transform 0.25s ease, opacity 0.25s ease;
      }
      #mainNav.is-open .mobile-menu-toggle span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
      #mainNav.is-open .mobile-menu-toggle span:nth-child(2) { opacity: 0; }
      #mainNav.is-open .mobile-menu-toggle span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
      .nav-menu-panel {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 1rem;
        padding: 1rem 1.5rem 1.25rem;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid #E6DED4;
        opacity: 0;
        pointer-events: none;
        transform: translateY(-8px);
        transition: opacity 0.25s ease, transform 0.25s ease;
      }
      #mainNav.is-open .nav-menu-panel {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }
      .nav-menu-panel > div:first-child {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .nav-menu-panel a {
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .nav-menu-panel .nav-lang-toggle {
        display: none;
      }
      .floating-lang-toggle {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        z-index: 60;
        display: flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.4rem;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(14px);
        border: 1px solid #E6DED4;
        box-shadow: 0 12px 30px rgba(27, 26, 24, 0.08);
      }
      .floating-lang-toggle button {
        border: 1px solid #E6DED4;
        min-width: 2.8rem;
        padding: 0.7rem 0.75rem;
        font-size: 0.625rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        transition: all 0.2s ease;
      }
    }
  </style>
</head>
<body class="min-h-screen overflow-x-hidden selection:bg-stone-300 selection:text-black flex flex-col">
  <nav class="fixed top-0 left-0 z-50 w-full bg-white/80 px-6 py-5 text-brand-text backdrop-blur-sm transition-all duration-500 md:px-12 md:py-8" id="mainNav">
    <div class="mx-auto flex max-w-[120rem] items-center justify-between gap-6">
      <a href="/index.html" id="navHomeLink" class="group flex items-center" aria-label="Blitzkneisser Photography">
        <img src="/Logo-Blitzkneisser-BERG.png" alt="Blitzkneisser Photography" class="h-11 w-auto brightness-0 contrast-125 opacity-70 transition duration-500 ease-out group-hover:opacity-100 md:h-14">
      </a>
      <button type="button" class="mobile-menu-toggle" id="navToggle" aria-expanded="false" aria-controls="navMenuPanel" aria-label="Menü öffnen"><span></span><span></span><span></span></button>
      <div class="nav-menu-panel ml-auto flex items-center justify-end gap-4 text-right" id="navMenuPanel">
        <div class="flex items-center gap-4 text-[10px] uppercase tracking-[0.2em] sm:gap-6 md:gap-8 md:text-xs">
          <a href="/index.html" id="navHomeMenuLink" class="hover:opacity-60 transition-opacity duration-300">Home</a>
          <a href="/experience/" id="navExperienceLink" class="hover:opacity-60 transition-opacity duration-300">Experience</a>
          <a href="/guides/" id="navGuidesLink" class="hover:opacity-60 transition-opacity duration-300">Guides</a>
          <a href="/journal/" id="navJournalLink" class="hover:opacity-60 transition-opacity duration-300">Journal</a>
          <a href="/about/" id="navAboutLink" class="hover:opacity-60 transition-opacity duration-300">Über mich</a>
          <a href="/contact/" id="navContactLink" class="hover:opacity-60 transition-opacity duration-300">Kontakt</a>
          <a href="/film/" id="navFilmLink" class="hidden hover:opacity-60 transition-opacity duration-300">Film</a>
          <a href="/academy/" id="navAcademyLink" class="hidden hover:opacity-60 transition-opacity duration-300">Academy</a>
        </div>
        <div class="nav-lang-toggle flex items-center gap-2 text-[10px] uppercase tracking-[0.24em] md:text-xs">
          <button type="button" class="border border-brand-border px-3 py-2 transition-colors" data-lang-button="de" aria-pressed="true">DE</button>
          <button type="button" class="border border-brand-border px-3 py-2 transition-colors" data-lang-button="en" aria-pressed="false">EN</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="floating-lang-toggle" id="floatingLangToggle" aria-label="Sprache wechseln">
    <button type="button" data-lang-button="de" aria-pressed="true">DE</button>
    <button type="button" data-lang-button="en" aria-pressed="false">EN</button>
  </div>

  <main class="flex-1">
    <section class="px-6 pb-24 pt-32 md:px-12 md:pb-32 md:pt-48">
      <div class="mx-auto max-w-[120rem]">
        <h1 id="pageTitle" class="headline text-[3.3rem] md:text-[6.4rem] lg:text-[8.7rem]">Impressum</h1>
        <div class="mt-8 h-px w-full bg-brand-border md:mt-10"></div>
      </div>
    </section>

    <section class="px-6 pb-24 md:px-12 md:pb-32">
      <div class="mx-auto max-w-4xl">
        <div id="pageBody" class="legal-copy text-lg font-light leading-8 text-brand-text/88"></div>
      </div>
    </section>
  </main>

  <footer class="mt-auto py-16 px-6 md:px-12 border-t border-brand-border flex flex-col gap-8 text-[10px] md:flex-row md:items-start md:justify-between md:gap-16 md:text-xs text-brand-muted tracking-[0.2em] uppercase font-medium bg-brand-bg">
    <div id="footerBrandText">© 2026 Blitzkneisser Photography</div>
    <div class="flex flex-wrap items-center justify-start gap-x-6 gap-y-3 md:gap-x-8">
      <a id="footerInstagramLink" href="#" class="hover:text-brand-text transition-colors duration-300">Instagram</a>
      <a id="footerContactLink" href="/contact/" class="hover:text-brand-text transition-colors duration-300">Kontakt</a>
      <a id="footerJournalLink" href="/journal/" class="hover:text-brand-text transition-colors duration-300">Journal</a>
    </div>
    <div id="footerInstagramFeed" class="footer-instagram-feed"></div>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const translations = {
        de: { home: "Home", about: "Über mich", film: "Film", contact: "Kontakt", page: "Impressum" },
        en: { home: "Home", about: "About", film: "Film", contact: "Contact", page: "Legal Notice" }
      };

      const nav = document.getElementById("mainNav");
      const navToggle = document.getElementById("navToggle");
      const navMenuPanel = document.getElementById("navMenuPanel");

      const detectAutoLanguage = () => {
        const candidates = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || "de"];
        return candidates.some((entry) => String(entry).toLowerCase().startsWith("de")) ? "de" : "en";
      };

      const params = new URLSearchParams(window.location.search);
      let currentLang = params.get("lang") === "en" ? "en" : ((params.get("lang") === "de" ? "de" : localStorage.getItem("site-lang")) || detectAutoLanguage());

      const closeNavMenu = () => {
        nav.classList.remove("is-open");
        navToggle?.setAttribute("aria-expanded", "false");
      };

      navToggle?.addEventListener("click", () => {
        const nextOpen = !nav.classList.contains("is-open");
        nav.classList.toggle("is-open", nextOpen);
        navToggle.setAttribute("aria-expanded", nextOpen ? "true" : "false");
      });

      navMenuPanel?.querySelectorAll("a, button[data-lang-button]").forEach((item) => {
        item.addEventListener("click", () => {
          if (window.innerWidth <= 767) closeNavMenu();
        });
      });

      let settings = {};
      try {
        const response = await fetch(`/content/settings/site.json?ts=${Date.now()}`, { cache: "no-store" });
        if (response.ok) settings = await response.json();
      } catch {}

      const render = (lang) => {
        currentLang = lang;
        localStorage.setItem("site-lang", lang);
        const t = translations[lang] || translations.de;
        document.documentElement.lang = lang;
        document.title = `${lang === "en" ? (settings.impressumTitleEn || t.page) : (settings.impressumTitleDe || t.page)} | Blitzkneisser Photography`;
        document.getElementById("pageTitle").textContent = lang === "en" ? (settings.impressumTitleEn || t.page) : (settings.impressumTitleDe || t.page);
        const bodyText = lang === "en" ? (settings.impressumBodyEn || "") : (settings.impressumBodyDe || "");
        document.getElementById("pageBody").innerHTML = String(bodyText).split(/\n\s*\n/).filter(Boolean).map((paragraph) => `<p>${paragraph.replace(/\n/g, "<br>")}</p>`).join("");
        document.getElementById("navHomeMenuLink").textContent = t.home;
        document.getElementById("navHomeMenuLink").href = lang === "en" ? "/index.html?lang=en" : "/index.html";
        document.getElementById("navAboutLink").textContent = t.about;
        document.getElementById("navFilmLink").textContent = t.film;
        document.getElementById("navContactLink").textContent = t.contact;
        document.getElementById("navExperienceLink").href = lang === "en" ? "/experience/?lang=en" : "/experience/";
        document.getElementById("navGuidesLink").href = lang === "en" ? "/guides/?lang=en" : "/guides/";
        document.getElementById("navAboutLink").href = lang === "en" ? "/about/?lang=en" : "/about/";
        document.getElementById("navFilmLink").href = lang === "en" ? "/film/?lang=en" : "/film/";
        document.getElementById("navJournalLink").href = lang === "en" ? "/journal/?lang=en" : "/journal/";
        document.getElementById("navContactLink").href = lang === "en" ? "/contact/?lang=en" : "/contact/";
        document.querySelectorAll("[data-lang-button]").forEach((button) => {
          const active = button.dataset.langButton === lang;
          button.setAttribute("aria-pressed", active ? "true" : "false");
          button.classList.toggle("bg-brand-text", active);
          button.classList.toggle("text-white", active);
        });
      };

      document.querySelectorAll("[data-lang-button]").forEach((button) => {
        button.addEventListener("click", () => render(button.dataset.langButton));
      });

      render(currentLang);
    });
  </script>
  <script src="/assets/footer-settings.js"></script>
</body>
</html>
