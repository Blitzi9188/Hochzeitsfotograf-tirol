  <script src="./data.js"></script>
  <script>
    const pricingRoot = document.getElementById("pricingRoot");
    const nav = document.getElementById("mainNav");
    const navToggle = document.getElementById("navToggle");
    const navMenuPanel = document.getElementById("navMenuPanel");
    const metaDescriptionNode = document.querySelector('meta[name="description"]');

    const detectAutoLanguage = () => {
      const browserLanguages = [
        ...(navigator.languages || []),
        navigator.language,
        navigator.userLanguage
      ]
        .filter(Boolean)
        .map((value) => String(value).toLowerCase());
      return browserLanguages.some((value) => value.startsWith("de")) ? "de" : "en";
    };

    const safeText = (value) => String(value ?? "");
    const escapeHtml = (value) =>
      safeText(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");

    const toHtml = (value) => safeText(value);
    const isFileMode = window.location.protocol === "file:";
    const siteRoot = isFileMode ? "../../" : "/";
    const assetUrl = (path) => `${siteRoot}${String(path).replace(/^\/+/, "")}`;
    const resolveUrl = (url) => {
      const value = String(url || "");
      if (!value) return "";
      if (/^(https?:|data:|blob:|mailto:|tel:|#)/i.test(value)) return value;
      return value.startsWith("/") ? assetUrl(value) : assetUrl(value);
    };
    const pageUrl = (path, lang) => {
      const cleanPath = String(path).replace(/^\/+/, "");
      if (!isFileMode) {
        return lang ? `/${cleanPath}?lang=${lang}` : `/${cleanPath}`;
      }
      const withIndex = cleanPath.endsWith("/") ? `${cleanPath}index.html` : cleanPath;
      return lang ? `${siteRoot}${withIndex}?lang=${lang}` : `${siteRoot}${withIndex}`;
    };

    const closeNavMenu = () => {
      nav.classList.remove("is-open");
      navToggle.setAttribute("aria-expanded", "false");
    };

    navToggle.addEventListener("click", () => {
      const willOpen = !nav.classList.contains("is-open");
      nav.classList.toggle("is-open", willOpen);
      navToggle.setAttribute("aria-expanded", willOpen ? "true" : "false");
    });

    navMenuPanel.querySelectorAll("a, button[data-lang-button]").forEach((item) => {
      item.addEventListener("click", () => {
        if (window.innerWidth < 768) closeNavMenu();
      });
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth >= 768) closeNavMenu();
    });

    window.addEventListener("scroll", () => {
      if (window.innerWidth < 768 && nav.classList.contains("is-open")) {
        closeNavMenu();
      }
    }, { passive: true });

    const renderGallery = (items, maxWidthClass = "max-w-[1720px]") => {
      const gallery = Array.isArray(items) ? items.filter(Boolean) : [];
      if (!gallery.length) return "";
      return `
        <div class="gallery-scroll">
          ${gallery.map((item) => `
            <figure class="rounded-none overflow-hidden border border-brand-border bg-white">
              <img src="${escapeHtml(resolveUrl(item.preview || item.url || item))}" alt="" class="gallery-image">
            </figure>
          `).join("")}
        </div>
      `;
    };

    const stripHtml = (html) => {
      const container = document.createElement("div");
      container.innerHTML = String(html || "");
      return (container.textContent || container.innerText || "").replace(/\s+/g, " ").trim();
    };

    const cleanPriceLabel = (label) => {
      const value = stripHtml(label);
      return value
        .replace(/\bPACKAGE\s*№?\s*1\b/gi, "Package 01")
        .replace(/\bPACKAGE\s*№?\s*2\b/gi, "Package 02")
        .replace(/\bPACKAGES2\b/gi, "Packages")
        .replace(/\bZUSATZ STUNDE(N)?\b/gi, "Additional Hours")
        .replace(/\bPRE\s*&\s*AFTER WEDDING\b/gi, "Pre- & After Wedding")
        .replace(/\bAFTER WEDDING\b/gi, "After Wedding");
    };

    const buildPriceOverview = (pricing) => {
      const blocks = Array.isArray(pricing?.blocks) ? pricing.blocks : [];
      const overview = [];
      const pushItem = (label, price) => {
        const cleanLabel = cleanPriceLabel(label);
        const cleanPrice = stripHtml(price);
        if (!cleanLabel || !cleanPrice) return;
        overview.push({ label: cleanLabel, price: cleanPrice });
      };

      blocks.forEach((block) => {
        const blockType = String(block?.type || "");
        if (blockType === "package-2") {
          (block.columns || []).forEach((column, index) => {
            pushItem(column?.name || `Package 0${index + 1}`, column?.price);
          });
          return;
        }
        if (blockType === "package-1") {
          const column = block.columns?.[0] || {};
          pushItem(block.name || column.name || "Elopement", column.price);
          return;
        }
        if (blockType === "collection-text-left-extra-right" || blockType === "includes-left-slider-right" || blockType === "slider-full-price-below") {
          const column = block.columns?.[0] || {};
          pushItem(block.name || column.name || "Section", column.price);
        }
      });

      return overview;
    };

    const renderPackageCard = (column, index) => `
      <article class="package-card">
        <div class="package-number">${String(index + 1).padStart(2, "0")}</div>
        <div class="relative z-10">
          <div class="package-head">
            <div class="package-price">
              ${toHtml(column.price || "")}
            </div>
          </div>
          ${column.image?.url ? `
            <div class="split-image mb-8">
              <img src="${escapeHtml(resolveUrl(column.image.url))}" alt="${escapeHtml(column.title || column.name || `Paket ${index + 1}`)}" class="w-full aspect-[4/3] object-cover">
            </div>
          ` : ""}
            <div class="package-body">
              <div class="pricing-copy">${toHtml(column.title || "")}${toHtml(column.includes || "")}${toHtml(column.text || "")}</div>
              <div class="split-meta">
                <div class="package-note">${toHtml(column.add_extras_text || "")}</div>
              </div>
            </div>
          </div>
      </article>
    `;

    const renderLeftRightSection = (block, options = {}) => {
      const column = block.columns?.[0] || {};
      const gallery = Array.isArray(block.gallery) ? block.gallery : [];
      const imageUrl = column.image?.url || gallery[0]?.preview || gallery[0]?.url || "";
      const inlinePriceBlocks = new Set(["Standesamt", "Film", "Elopement"]);
      const showInlinePrice = inlinePriceBlocks.has(String(block.name || ""));
      return `
        <section class="split-card">
          <div class="split-grid">
            <article>
              <div class="split-badge">${escapeHtml(block.name || "Section")}</div>
              <div class="split-title-row">
                <div class="split-title">${toHtml(column.title || block.name || "")}</div>
                ${showInlinePrice && column.price ? `<div class="split-inline-price">${toHtml(column.price || "")}</div>` : ""}
              </div>
              <div class="split-copy pricing-copy">
                ${toHtml(column.text || "")}
                ${toHtml(column.includes || "")}
                ${toHtml(column.add_extras_text || "")}
              </div>
              ${column.price && !showInlinePrice ? `
                <div class="split-meta">
                  <div class="split-badge">Investment</div>
                  <div class="split-price">${toHtml(column.price || "")}</div>
                </div>
              ` : ""}
            </article>
            <aside class="flex flex-col gap-4">
              ${imageUrl ? `
                <div class="split-image">
                  <img src="${escapeHtml(resolveUrl(imageUrl))}" alt="${escapeHtml(options.alt || block.name || "")}" class="w-full aspect-[4/5] object-cover">
                </div>
              ` : ""}
              ${gallery.length ? renderGallery(gallery) : ""}
            </aside>
          </div>
        </section>
      `;
    };

    const renderTextCentered = (block, extraClass = "") => `
      <section class="page-section py-16 md:py-20 ${extraClass}">
        <div class="mx-auto max-w-4xl">
          <div class="pricing-copy text-brand-text">${toHtml(block.text || "")}</div>
        </div>
      </section>
    `;

    const renderVideoCentered = (block) => {
      const video = block.video || {};
      return `
        <section class="page-section py-16 md:py-20">
          <div class="mx-auto max-w-[1720px]">
            <a href="${escapeHtml(video.url || "#")}" target="_blank" rel="noreferrer" class="block relative overflow-hidden section-card">
              ${video.cover ? `<img src="${escapeHtml(resolveUrl(video.cover))}" alt="${escapeHtml(block.name || "Film")}" class="w-full h-[52vh] object-cover">` : ""}
              <div class="absolute inset-0 flex items-center justify-center">
                <span class="inline-flex items-center justify-center w-24 h-24 rounded-full border border-brand-border bg-white/85 text-[10px] uppercase tracking-[0.28em] shadow-sm">Play</span>
              </div>
            </a>
          </div>
        </section>
      `;
    };

    const renderSliderFull = (block) => {
      const column = block.columns?.[0] || {};
      const gallery = Array.isArray(block.gallery) ? block.gallery : [];
      return `
        <section class="page-section py-16 md:py-20">
          <div class="mx-auto max-w-[1720px] grid gap-10">
            <article class="section-card p-6 md:p-8 lg:p-10">
              <div class="pricing-copy">${toHtml(column.includes || "")}</div>
            </article>
            ${renderGallery(gallery)}
            <article class="section-card p-6 md:p-8">
              <div class="pricing-copy">${toHtml(column.price || "")}</div>
            </article>
          </div>
        </section>
      `;
    };

    const renderFaqColumns = (block) => {
      const [left = {}, right = {}] = block.columns || [];
      return `
        <section class="faq-section">
          <div class="mx-auto max-w-[1720px] grid gap-10 lg:grid-cols-2">
            <article class="section-card p-6 md:p-8 lg:p-10">
              <div class="pricing-copy">${toHtml(left.title || "")}${toHtml(left.text || "")}${toHtml(left.includes || "")}</div>
            </article>
            <article class="section-card p-6 md:p-8 lg:p-10">
              <div class="pricing-copy">${toHtml(right.title || "")}${toHtml(right.text || "")}${toHtml(right.includes || "")}</div>
            </article>
          </div>
        </section>
      `;
    };

    const renderInquiry = (form, lang = "de") => {
      const settings = form?.settings || {};
      const inputs = Array.isArray(form?.inputs) ? form.inputs : [];
      const inputById = (id) => inputs.find((item) => item.id === id || item.name === id) || {};
      const uiText = lang === "en"
        ? {
            kicker: "Inquiry",
            email: "Email",
            language: "Language",
            note: "The inquiry will be prepared by email, just like on the existing price list.",
            submit: settings.submit_text || "Send",
            status: "Preparing email..."
          }
        : {
            kicker: "Anfrage",
            email: "E-Mail",
            language: "Sprache",
            note: "Die Anfrage wird wie auf der bestehenden Preisliste per Mail vorbereitet.",
            submit: settings.submit_text || "Senden",
            status: "E-Mail wird vorbereitet..."
          };
      const field = (item, widthClass = "md:col-span-1") => {
        if (!item || item.type === "hidden") return "";
        if (item.type === "select") {
          return `
            <div class="${widthClass} flex flex-col gap-2">
              <label class="text-[10px] uppercase tracking-[0.24em] text-[#111111]">${escapeHtml(item.name || "")}</label>
              <select name="${escapeHtml(item.id)}" class="w-full border border-brand-border bg-white px-4 py-3 text-sm outline-none transition focus:border-brand-text" data-field="${escapeHtml(item.id)}">
                ${(item.options || []).map((option) => `<option value="${escapeHtml(option)}">${escapeHtml(option)}</option>`).join("")}
              </select>
            </div>
          `;
        }
        const tag = item.type === "textarea" ? "textarea" : "input";
        const attrs = tag === "textarea" ? `rows="5"` : `type="${item.type === "email" ? "email" : "text"}"`;
        return `
          <div class="${widthClass} flex flex-col gap-2">
            <label class="text-[10px] uppercase tracking-[0.24em] text-[#111111]">${escapeHtml(item.name || "")}</label>
            ${tag === "textarea"
              ? `<textarea name="${escapeHtml(item.id)}" ${attrs} class="w-full border border-brand-border bg-white px-4 py-3 text-sm outline-none transition focus:border-brand-text" placeholder="${escapeHtml(item.placeholder || item.name || "")}" data-field="${escapeHtml(item.id)}"></textarea>`
              : `<input name="${escapeHtml(item.id)}" ${attrs} class="w-full border border-brand-border bg-white px-4 py-3 text-sm outline-none transition focus:border-brand-text" placeholder="${escapeHtml(item.placeholder || item.name || "")}" data-field="${escapeHtml(item.id)}">`}
          </div>
        `;
      };

      return `
        <section class="booking-section">
          <div class="mx-auto max-w-[1720px]">
            <div class="grid gap-10 lg:grid-cols-[1.05fr_0.95fr]">
              <article class="section-card p-6 md:p-8 lg:p-10">
                <div class="form-kicker">${uiText.kicker}</div>
                <div class="booking-title">${toHtml(settings.title || "")}</div>
                <form class="grid gap-5 md:grid-cols-2" id="preislisteInquiryForm">
                  ${field(inputById("name"))}
                  ${field(inputById("text_24161"))}
                  ${field(inputById("email"))}
                  ${field(inputById("date"))}
                  ${field(inputById("location"))}
                  ${field(inputById("text_87661"))}
                  ${field(inputById("select_14901"), "md:col-span-2")}
                  ${field(inputById("textarea_41921"), "md:col-span-2")}
                  ${field(inputById("text_81"), "md:col-span-2")}
                  <div class="md:col-span-2 flex flex-wrap gap-3 pt-2">
                    <button type="submit" class="px-8 py-4 bg-brand-text text-white text-[10px] uppercase tracking-[0.32em] transition hover:bg-brand-muted">${escapeHtml(uiText.submit)}</button>
                  </div>
                </form>
                <p class="mt-4 text-xs uppercase tracking-[0.22em] text-[#111111]" id="inquiryStatus"></p>
              </article>
              <aside class="section-soft p-6 md:p-8 lg:p-10">
                <div class="pricing-copy">${toHtml(settings.name || "")}</div>
                <div class="mt-8 space-y-6 text-sm leading-7 text-brand-text/85">
                  <div><span class="block text-[10px] uppercase tracking-[0.24em] text-[#111111] mb-2">${escapeHtml(uiText.email)}</span><a href="mailto:${escapeHtml(form?.admin_email || "")}" class="underline underline-offset-8">${escapeHtml(form?.admin_email || "")}</a></div>
                  <div><span class="block text-[10px] uppercase tracking-[0.24em] text-[#111111] mb-2">${escapeHtml(uiText.language)}</span><span>${escapeHtml(form?.language || "")}</span></div>
                  <div><span class="block text-[10px] uppercase tracking-[0.24em] text-[#111111] mb-2">${lang === "en" ? "Note" : "Hinweis"}</span><span>${escapeHtml(uiText.note)}</span></div>
                </div>
              </aside>
            </div>
          </div>
        </section>
      `;
    };

    const renderTerms = (html) => `
      <section class="page-section py-16 md:py-20">
        <div class="mx-auto max-w-[1720px]">
          <article class="section-card p-6 md:p-8 lg:p-10 pricing-copy">
            ${toHtml(html)}
          </article>
        </div>
      </section>
    `;

    const renderBlock = (block) => {
      if (!block) return "";
      const blockType = String(block.type || "");
      if (blockType === "text-centered") {
        if (block.slug === "intro") {
          const image = block.background?.image || "";
          return `
            <section class="page-section py-20 md:py-28">
              <div class="mx-auto max-w-[1720px] grid gap-10 lg:grid-cols-[1.05fr_0.95fr] lg:items-center">
                <div class="space-y-8">
                  <div class="pricing-copy max-w-3xl">${toHtml(block.text || "")}</div>
                  <div class="section-rule"></div>
                </div>
                <div class="section-card overflow-hidden">
                  ${image ? `<img src="${escapeHtml(resolveUrl(image))}" alt="${escapeHtml(block.name || "Preisliste")}" class="w-full aspect-[4/5] object-cover" style="object-position:${escapeHtml(block.background?.position || "50% 50%")}">` : ""}
                </div>
              </div>
            </section>
          `;
        }
        return renderTextCentered(block);
      }
      if (blockType === "package-2") {
        return `
          <section class="page-section py-20 md:py-28">
            <div class="mx-auto max-w-[1720px] grid gap-8 lg:grid-cols-2">
              ${(block.columns || []).map((column, index) => renderPackageCard(column, index)).join("")}
            </div>
          </section>
        `;
      }
      if (blockType === "collection-text-left-extra-right") {
        return renderLeftRightSection(block);
      }
      if (blockType === "includes-left-slider-right") {
        return renderLeftRightSection(block);
      }
      if (blockType === "video-centered") {
        return renderVideoCentered(block);
      }
      if (blockType === "package-1") {
        const column = block.columns?.[0] || {};
        return `
          <section class="page-section py-20 md:py-28">
            <div class="mx-auto max-w-[1720px] grid gap-10 lg:grid-cols-[0.95fr_1.05fr] lg:items-start">
              <div class="section-card p-6 md:p-8 lg:p-10 pricing-copy">
                ${toHtml(column.includes || "")}
                ${toHtml(column.price || "")}
              </div>
              <div class="section-card overflow-hidden">
                <img src="${escapeHtml(resolveUrl(column.image?.url || ""))}" alt="${escapeHtml(block.name || "")}" class="w-full h-full min-h-[34rem] object-cover">
              </div>
            </div>
          </section>
        `;
      }
      if (blockType === "slider-full-price-below") {
        return renderSliderFull(block);
      }
      if (blockType === "text-2columns") {
        return renderFaqColumns(block);
      }
      return renderTextCentered(block);
    };

    const renderIntroPanel = (pricing) => {
      const blocks = Array.isArray(pricing.blocks) ? pricing.blocks : [];
      const introCopyBlock = blocks[1] || {};
      const compactIntroHtml = (html) => {
        const paragraphs = String(html || "").match(/<p[^>]*>.*?<\/p>/gis) || [];
        const meaningful = paragraphs
          .map((paragraph) => paragraph.trim())
          .filter((paragraph) => !/^<p[^>]*>\s*(?:<br\s*\/?>)?\s*<\/p>$/i.test(paragraph))
          .slice(0, 2);
        return meaningful.join("");
      };
      return `
        <div class="intro-head">
          <h1 class="headline intro-title">Preise</h1>
        </div>
        <div class="intro-copy">
          <div class="pricing-copy">${compactIntroHtml(toHtml(introCopyBlock.text || ""))}</div>
        </div>
      `;
    };

    const renderPage = (pricing, lang = "de") => {
      const blocks = Array.isArray(pricing.blocks) ? pricing.blocks : [];
      const terms = pricing.terms || "";
      const contentBlocks = blocks.slice(2);
      const contentHtml = contentBlocks.map((block, index) => {
        const contentIndex = index + 3;
        if (block.type === "package-2") {
          return `
            <section class="page-section py-0">
              <div class="mx-auto max-w-[1720px] grid gap-0 lg:grid-cols-2">
                ${(block.columns || []).map((column, columnIndex) => renderPackageCard(column, columnIndex)).join("")}
              </div>
            </section>
          `;
        }
        if (block.type === "collection-text-left-extra-right" || block.type === "includes-left-slider-right") {
          return renderLeftRightSection(block, { alt: `${block.name || ""} ${contentIndex}` });
        }
        if (block.type === "video-centered") {
          return renderVideoCentered(block);
        }
        if (block.type === "package-1") {
          const column = block.columns?.[0] || {};
          return `
            <section class="page-section py-0">
              <article class="package-card">
                <div class="package-number">${String(contentIndex).padStart(2, "0")}</div>
                <div class="relative z-10">
                  <div class="package-head">
                    <div class="package-price">${toHtml(column.price || "")}</div>
                  </div>
                  ${column.image?.url ? `
                    <div class="split-image mb-8">
                      <img src="${escapeHtml(resolveUrl(column.image.url))}" alt="${escapeHtml(block.name || "")}" class="w-full aspect-[4/3] object-cover">
                    </div>
                  ` : ""}
                  <div class="package-body">
                    <div class="pricing-copy">${toHtml(column.includes || "")}</div>
                    <div class="split-meta">
                      <div class="package-note">${toHtml(column.add_extras_text || "")}</div>
                    </div>
                  </div>
                </div>
              </article>
            </section>
          `;
        }
        if (block.type === "slider-full-price-below") {
          return renderSliderFull(block);
        }
        if (block.type === "text-centered") {
          return renderTextCentered(block);
        }
        if (block.type === "text-2columns") {
          return renderFaqColumns(block);
        }
        return renderBlock(block);
      }).join("");

      pricingRoot.innerHTML = `
        <section class="pricing-shell">
          <aside class="pricing-left">
            ${renderIntroPanel(pricing)}
          </aside>
          <section class="pricing-right">
            ${contentHtml}
            ${pricing.show_inquiry ? renderInquiry(pricing.inquiry_form || {}, lang) : ""}
            ${pricing.show_terms && terms ? renderTerms(terms) : ""}
          </section>
        </section>
      `;

      const form = document.getElementById("preislisteInquiryForm");
      const statusNode = document.getElementById("inquiryStatus");
      if (form && statusNode) {
        const inquiry = pricing.inquiry_form || {};
        form.addEventListener("submit", (event) => {
          event.preventDefault();
          const formData = new FormData(form);
          const entries = (Array.isArray(inquiry.inputs) ? inquiry.inputs : [])
            .filter((item) => item && item.type !== "hidden")
            .map((item) => [item.name || item.id, formData.get(item.id) || ""]);
          const recipient = String(inquiry.admin_email || "foto@blitzkneisser.com").trim();
          const subject = encodeURIComponent("Preisliste Anfrage");
          const body = encodeURIComponent(
            entries
              .map(([key, value]) => `${key}: ${value}`)
              .join("\n")
          );
          statusNode.textContent = initialLang === "en" ? "Preparing email..." : "E-Mail wird vorbereitet...";
          window.location.href = `mailto:${recipient}?subject=${subject}&body=${body}`;
        });
      }
    };

    const buildPricingUrl = (lang) => {
      const nextLang = lang === "en" ? "en" : "de";
      if (isFileMode) {
        return nextLang === "en" ? "../../preisliste/26-27/index.html?lang=en" : "../../preisliste/26-27/index.html";
      }
      return nextLang === "en" ? "/preisliste/26-27/?lang=en" : "/preisliste/26-27/";
    };

    const applyLanguage = async (lang) => {
      const initialLang = lang === "en" ? "en" : "de";
      localStorage.setItem("site-lang", initialLang);
      document.documentElement.lang = initialLang;

      const pricing = await (async () => {
        try {
          const dataPath = initialLang === "en"
            ? assetUrl("content/preisliste/en.json")
            : assetUrl("content/preisliste/de.json");
          const response = await fetch(`${dataPath}?ts=${Date.now()}`, { cache: "no-store" });
          if (response.ok) {
            return await response.json();
          }
        } catch {
          // Fallback to embedded pricing data below.
        }
        return window.PREISLISTE_DATA?.[initialLang] || {};
      })();

      document.title = `${pricing.title || "Preisliste 26/27"} | Blitzkneisser Photography`;
      if (metaDescriptionNode) {
        metaDescriptionNode.setAttribute("content", `Preisliste 26/27 von Blitzkneisser Photography.`);
      }

      document.getElementById("navHomeMenuLink").href = pageUrl("index.html", initialLang === "en" ? "en" : "");
      document.getElementById("navHomeLink").href = pageUrl("index.html", initialLang === "en" ? "en" : "");
      document.getElementById("navExperienceLink").href = pageUrl("experience/", initialLang === "en" ? "en" : "");
      document.getElementById("navGuidesLink").href = pageUrl("guides/", initialLang === "en" ? "en" : "");
      document.getElementById("navAboutLink").href = pageUrl("about/", initialLang === "en" ? "en" : "");
      document.getElementById("navFilmLink").href = pageUrl("film/", initialLang === "en" ? "en" : "");
      document.getElementById("navJournalLink").href = pageUrl("journal/", initialLang === "en" ? "en" : "");
      document.getElementById("navContactLink").href = pageUrl("contact/", initialLang === "en" ? "en" : "");

      document.getElementById("footerContactLink").href = pageUrl("contact/", initialLang === "en" ? "en" : "");
      document.getElementById("footerJournalLink").href = pageUrl("journal/", initialLang === "en" ? "en" : "");
      document.getElementById("footerFilmLink").href = pageUrl("film/", initialLang === "en" ? "en" : "");
      document.getElementById("footerHomeLink").href = pageUrl("index.html", initialLang === "en" ? "en" : "");

      document.querySelectorAll("[data-lang-button]").forEach((button) => {
        const active = button.dataset.langButton === initialLang;
        button.setAttribute("aria-pressed", active ? "true" : "false");
        button.style.backgroundColor = active ? "#1B1A18" : "transparent";
        button.style.color = active ? "#F9F7F2" : "#1B1A18";
        button.style.borderColor = active ? "#1B1A18" : "#E6DED4";
        button.classList.toggle("is-active", active);
      });

      window.history.replaceState({}, "", buildPricingUrl(initialLang));
      renderPage(pricing, initialLang);
    };

    document.querySelectorAll("[data-lang-button]").forEach((button) => {
      button.addEventListener("click", () => {
        const nextLang = button.dataset.langButton === "en" ? "en" : "de";
        localStorage.setItem("site-lang", nextLang);
        window.location.href = buildPricingUrl(nextLang);
      });
    });

    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const initialLang = params.get("lang") === "en"
        ? "en"
        : (params.get("lang") === "de" ? "de" : (localStorage.getItem("site-lang") || detectAutoLanguage()));
      applyLanguage(initialLang);
    });
  </script>
  <script src="../../assets/footer-settings.js"></script>
</body>
</html>
